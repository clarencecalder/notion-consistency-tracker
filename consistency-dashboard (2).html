<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consistency Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #111110;
    --surface:  #1C1C1A;
    --surface2: #242422;
    --border:   #2E2E2B;
    --text:     #EEECEA;
    --muted:    #6B6966;
    --accent:   #5A9E27;
    --alight:   #8BC34A;
    --warn:     #E07040;
    --wpale:    #2A1A10;
    --shadow:   0 1px 4px rgba(0,0,0,0.5);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:28px 20px;}
  .page{max-width:960px;margin:0 auto;}

  /* header */
  .hdr{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:24px;}
  .hdr h1{font-family:'Instrument Serif',serif;font-size:36px;font-weight:400;letter-spacing:-0.5px;line-height:1.1;}
  .hdr p{font-size:12px;color:var(--muted);margin-top:4px;font-family:'DM Mono',monospace;}
  .clock{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 13px;}

  /* hero */
  .hero{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px 26px;margin-bottom:18px;display:flex;align-items:center;gap:26px;position:relative;overflow:hidden;box-shadow:var(--shadow);}
  .hero::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(138,195,74,0.04);}
  .ring{position:relative;flex-shrink:0;}
  .ring svg{transform:rotate(-90deg);}
  .r-track{fill:none;stroke:var(--border);stroke-width:6;}
  .r-fill{fill:none;stroke:var(--alight);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .9s cubic-bezier(.4,0,.2,1);}
  .r-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .r-pct{font-family:'Instrument Serif',serif;font-size:26px;color:var(--text);line-height:1;}
  .r-sub{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1px;}
  .hero-info{flex:1;min-width:0;}
  .h-day{font-family:'Instrument Serif',serif;font-size:20px;color:var(--text);font-style:italic;}
  .h-date{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px;margin-bottom:13px;}
  .hbar-wrap{background:var(--surface2);border-radius:6px;height:5px;overflow:hidden;}
  .hbar-fill{height:100%;background:linear-gradient(90deg,#4a8020,var(--alight));border-radius:6px;transition:width .9s cubic-bezier(.4,0,.2,1);}
  .h-counts{display:flex;gap:18px;margin-top:9px;}
  .h-cnt{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;}
  .h-cnt span{color:var(--text);font-weight:500;}

  /* stats */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px;}
  .sc{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;box-shadow:var(--shadow);}
  .sv{font-family:'Instrument Serif',serif;font-size:26px;color:var(--text);line-height:1;}
  .sl{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);margin-top:4px;}

  /* panel */
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:18px;}
  .ph{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .pt{font-size:13px;font-weight:500;letter-spacing:.3px;}
  .pb{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:2px 10px;}
  .wnav{display:flex;align-items:center;gap:7px;}
  .wnb{width:26px;height:26px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-size:15px;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1;}
  .wnb:hover:not(:disabled){background:var(--border);color:var(--text);}
  .wnb:disabled{opacity:.3;cursor:default;}
  .wr{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}

  /* grid */
  .gscroll{overflow-x:auto;}
  .grid{display:grid;grid-template-columns:200px repeat(7,1fr);min-width:540px;}

  /* head row */
  .gh{text-align:center;padding:9px 5px 7px;border-bottom:1px solid var(--border);}
  .gh:first-child{text-align:left;padding-left:18px;}
  .ghn{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;color:var(--muted);display:block;}
  .ghd{font-size:13px;font-weight:500;color:var(--text);display:inline-block;margin-top:3px;width:24px;height:24px;line-height:24px;text-align:center;}
  .gh.today .ghn{color:var(--alight);}
  .gh.today .ghd{background:var(--accent);color:#fff;border-radius:50%;}

  /* pct row */
  .gp{text-align:center;padding:7px 5px;border-bottom:1px solid var(--border);background:var(--surface2);}
  .gp:first-child{text-align:left;padding-left:18px;font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);display:flex;align-items:center;}
  .gpn{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;display:block;margin-bottom:3px;}
  .gbw{height:3px;border-radius:3px;background:var(--border);overflow:hidden;margin:0 auto;width:68%;}
  .gbf{height:100%;border-radius:3px;transition:width .6s ease;}

  /* habit name cell */
  .gnc{display:flex;align-items:center;gap:9px;padding:9px 10px 9px 18px;border-bottom:1px solid var(--border);transition:background .12s;}
  .gnc:hover{background:var(--surface2);}
  .gem{font-size:14px;width:19px;text-align:center;flex-shrink:0;}
  .glb{flex:1;min-width:0;}
  .gnn{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .gct{font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);margin-top:1px;}
  .gdel{opacity:0;background:none;border:none;cursor:pointer;color:var(--muted);font-size:12px;padding:2px 4px;border-radius:4px;transition:all .15s;flex-shrink:0;}
  .gnc:hover .gdel{opacity:1;}
  .gdel:hover{color:var(--warn);background:var(--wpale);}

  /* toggle cell */
  .gtc{display:flex;align-items:center;justify-content:center;padding:9px 5px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
  .gtc:hover:not(.fut){background:var(--surface2);}
  .gtc.fut{cursor:not-allowed;}
  .dot{width:23px;height:23px;border-radius:6px;border:1.5px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;transition:all .2s cubic-bezier(.34,1.56,.64,1);}
  .dot svg{opacity:0;transform:scale(.4);transition:all .2s cubic-bezier(.34,1.56,.64,1);}
  .gtc.done .dot{background:var(--accent);border-color:var(--accent);transform:scale(1.1);}
  .gtc.done .dot svg{opacity:1;transform:scale(1);}
  .gtc.fut .dot{opacity:.25;}

  /* total row */
  .gtr{background:var(--surface2);text-align:center;padding:8px 5px;}
  .gtr:first-child{text-align:left;padding-left:18px;font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);display:flex;align-items:center;}
  .gtv{font-family:'DM Mono',monospace;font-size:12px;font-weight:600;}

  /* empty */
  .empty{padding:32px 18px;text-align:center;color:var(--muted);font-size:13px;font-family:'DM Mono',monospace;grid-column:1/-1;}

  /* add */
  .addrow{padding:11px 18px;display:flex;gap:8px;}
  .addinp{flex:1;border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--surface2);color:var(--text);outline:none;transition:border-color .15s;}
  .addinp:focus{border-color:var(--alight);}
  .addinp::placeholder{color:var(--muted);}
  .addbtn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 15px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .15s;}
  .addbtn:hover{opacity:.85;}

  @media(max-width:580px){
    .hero{flex-direction:column;text-align:center;}
    .h-counts{justify-content:center;}
  }
</style>
</head>
<body>
<div class="page">

  <div class="hdr">
    <div>
      <h1>Consistency</h1>
      <p id="today-label"></p>
    </div>
    <div class="clock" id="clock">--:--:--</div>
  </div>

  <div class="hero">
    <div class="ring">
      <svg width="84" height="84" viewBox="0 0 84 84">
        <circle class="r-track" cx="42" cy="42" r="35"/>
        <circle class="r-fill" id="rfill" cx="42" cy="42" r="35"
          stroke-dasharray="219.91" stroke-dashoffset="219.91"/>
      </svg>
      <div class="r-center">
        <div class="r-pct" id="rpct">0%</div>
        <div class="r-sub">today</div>
      </div>
    </div>
    <div class="hero-info">
      <div class="h-day"  id="hday"></div>
      <div class="h-date" id="hdate"></div>
      <div class="hbar-wrap"><div class="hbar-fill" id="hbar" style="width:0%"></div></div>
      <div class="h-counts">
        <div class="h-cnt"><span id="hdone">0</span> done</div>
        <div class="h-cnt"><span id="htotal">0</span> total</div>
        <div class="h-cnt"><span id="hstreak">0</span> day streak 🔥</div>
      </div>
    </div>
  </div>

  <div class="stats">
    <div class="sc"><div class="sv" id="savg">—</div><div class="sl">7-day avg</div></div>
    <div class="sc"><div class="sv" id="sbest">—</div><div class="sl">best day</div></div>
    <div class="sc"><div class="sv" id="sstreak">0</div><div class="sl">streak days</div></div>
  </div>

  <div class="panel">
    <div class="ph">
      <span class="pt">Weekly Progress</span>
      <div style="display:flex;align-items:center;gap:11px;">
        <span class="pb" id="hbadge">0 habits</span>
        <div class="wnav">
          <button class="wnb" id="btnprev" onclick="shiftWeek(-1)">‹</button>
          <span class="wr" id="wrange"></span>
          <button class="wnb" id="btnnext" onclick="shiftWeek(1)">›</button>
        </div>
      </div>
    </div>
    <div class="gscroll"><div class="grid" id="grid"></div></div>
    <div class="addrow">
      <input class="addinp" id="newinput" placeholder="Add a habit or task…" maxlength="60"/>
      <button class="addbtn" onclick="addHabit()">Add</button>
    </div>
  </div>

</div>
<script>
// ── Constants ──────────────────────────────────────────────────────
const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const EMOJIS = ['✅','📌','⭐','🎯','💪','🌱','🔥','✨','🎨','📝','🏃','🧠','💡','🌟','⚡'];
const CATS   = ['health','learning','wellness','productivity','mindfulness','fitness','creativity','general'];

// ── Pure in-memory state (no localStorage — works everywhere) ──────
const state = {
  habits: [
    {id:1,name:'Morning workout',      emoji:'🏋️',category:'health'      },
    {id:2,name:'Read for 30 mins',     emoji:'📖',category:'learning'    },
    {id:3,name:'Drink 8 glasses water',emoji:'💧',category:'health'      },
    {id:4,name:'Meditate',             emoji:'🧘',category:'wellness'    },
    {id:5,name:'Journal entry',        emoji:'✍️',category:'mindfulness' },
  ],
  history: {},
  nextId: 6,
};

let weekOffset = 0;

// ── Date helpers ───────────────────────────────────────────────────
function dkey(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
const TODAY = dkey(new Date());
function isFuture(d){ return dkey(d) > TODAY; }
function ensure(k){ if(!state.history[k]) state.history[k]={completed:[]}; }

function weekDates(offset){
  const t=new Date(), dow=t.getDay(), toMon=dow===0?-6:1-dow;
  const mon=new Date(t); mon.setDate(t.getDate()+toMon+offset*7);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}

// ── Seed demo history ──────────────────────────────────────────────
(function(){
  const ids=state.habits.map(h=>h.id);
  for(let i=1;i<=13;i++){
    const d=new Date(); d.setDate(d.getDate()-i);
    const k=dkey(d);
    const count=Math.floor(Math.random()*(ids.length+1));
    state.history[k]={completed:[...ids].sort(()=>.5-Math.random()).slice(0,count)};
  }
})();

// ── Computed ───────────────────────────────────────────────────────
function dayPct(k){
  const h=state.history[k];
  if(!h||!state.habits.length) return 0;
  return Math.round(h.completed.length/state.habits.length*100);
}
function barColor(p){ return p>=100?'#5A9E27':p>=60?'#7ab830':p>=30?'#c49a20':'#E07040'; }

function calcStreak(){
  let s=0; const t=new Date();
  for(let i=0;i<365;i++){
    const d=new Date(t); d.setDate(t.getDate()-i);
    const h=state.history[dkey(d)];
    if(!h||!state.habits.length){if(i===0)continue;break;}
    if(h.completed.length/state.habits.length>=.5) s++;
    else if(i>0) break;
  }
  return s;
}
function habitStreak(id){
  let s=0; const t=new Date();
  for(let i=0;i<365;i++){
    const d=new Date(t); d.setDate(t.getDate()-i);
    const h=state.history[dkey(d)];
    if(h&&h.completed.includes(id)) s++;
    else if(i>0) break;
  }
  return s;
}

// ── Render hero ────────────────────────────────────────────────────
function renderHero(){
  ensure(TODAY);
  const comp=state.history[TODAY].completed, tot=state.habits.length;
  const pct=tot?Math.round(comp.length/tot*100):0;
  document.getElementById('rpct').textContent=pct+'%';
  document.getElementById('hdone').textContent=comp.length;
  document.getElementById('htotal').textContent=tot;
  document.getElementById('hbar').style.width=pct+'%';
  const circ=219.91;
  document.getElementById('rfill').style.strokeDashoffset=circ-(pct/100)*circ;
  const s=calcStreak();
  document.getElementById('hstreak').textContent=s;
  document.getElementById('sstreak').textContent=s;
}

function renderStats(){
  const t=new Date(), pcts=[];
  for(let i=1;i<=7;i++){
    const d=new Date(t); d.setDate(t.getDate()-i);
    const k=dkey(d);
    if(state.history[k]) pcts.push(dayPct(k));
  }
  if(pcts.length){
    document.getElementById('savg').textContent=Math.round(pcts.reduce((a,b)=>a+b,0)/pcts.length)+'%';
    document.getElementById('sbest').textContent=Math.max(...pcts)+'%';
  }
}

// ── Render grid ────────────────────────────────────────────────────
function renderGrid(){
  const days=weekDates(weekOffset);
  const f=days[0],l=days[6];
  document.getElementById('wrange').textContent=
    `${MONTHS[f.getMonth()].slice(0,3)} ${f.getDate()} – ${MONTHS[l.getMonth()].slice(0,3)} ${l.getDate()}`;
  document.getElementById('btnnext').disabled=weekOffset>=0;
  document.getElementById('hbadge').textContent=`${state.habits.length} habit${state.habits.length!==1?'s':''}`;

  let h='';

  // day headers
  h+=`<div class="gh" style="display:flex;align-items:center;font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);">Habit</div>`;
  days.forEach(d=>{
    const isT=dkey(d)===TODAY;
    h+=`<div class="gh ${isT?'today':''}"><span class="ghn">${DAYS[d.getDay()]}</span><span class="ghd">${d.getDate()}</span></div>`;
  });

  // pct row
  h+=`<div class="gp">Daily %</div>`;
  days.forEach(d=>{
    const k=dkey(d),fut=isFuture(d),pct=fut?null:dayPct(k),col=fut?'var(--border)':barColor(pct||0);
    h+=`<div class="gp"><span class="gpn" style="color:${fut?'var(--muted)':col}">${fut?'–':pct+'%'}</span><div class="gbw"><div class="gbf" style="width:${fut?0:pct}%;background:${col}"></div></div></div>`;
  });

  // habit rows
  if(!state.habits.length){
    h+=`<div class="empty">No habits yet — add one below.</div>`;
  } else {
    state.habits.forEach(hab=>{
      const hs=habitStreak(hab.id);
      h+=`<div class="gnc"><span class="gem">${hab.emoji}</span><div class="glb"><div class="gnn">${hab.name}</div><div class="gct">${hab.category}${hs>1?' · '+hs+'d 🔥':''}</div></div><button class="gdel" onclick="delHabit(event,${hab.id})">✕</button></div>`;
      days.forEach(d=>{
        const k=dkey(d),fut=isFuture(d);
        ensure(k);
        const done=state.history[k].completed.includes(hab.id);
        h+=`<div class="gtc ${done?'done':''} ${fut?'fut':''}" ${!fut?`onclick="toggle('${k}',${hab.id})"`:''}>
          <div class="dot"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 3.5L3.5 6L9 1" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        </div>`;
      });
    });
  }

  // totals
  h+=`<div class="gtr">Week avg</div>`;
  days.forEach(d=>{
    const k=dkey(d),fut=isFuture(d),pct=fut?null:dayPct(k),col=fut?'var(--muted)':barColor(pct||0);
    h+=`<div class="gtr"><span class="gtv" style="color:${col}">${fut?'–':pct+'%'}</span></div>`;
  });

  document.getElementById('grid').innerHTML=h;
}

// ── Actions ────────────────────────────────────────────────────────
function toggle(k,id){
  ensure(k);
  const c=state.history[k].completed,i=c.indexOf(id);
  if(i>-1) c.splice(i,1); else c.push(id);
  renderAll();
}
function addHabit(){
  const inp=document.getElementById('newinput'),name=inp.value.trim();
  if(!name) return;
  state.habits.push({id:state.nextId++,name,emoji:EMOJIS[Math.floor(Math.random()*EMOJIS.length)],category:CATS[Math.floor(Math.random()*CATS.length)]});
  inp.value=''; renderAll();
}
function delHabit(e,id){
  e.stopPropagation();
  state.habits=state.habits.filter(h=>h.id!==id);
  Object.values(state.history).forEach(d=>{d.completed=d.completed.filter(c=>c!==id);});
  renderAll();
}
function shiftWeek(dir){ weekOffset=Math.min(0,weekOffset+dir); renderGrid(); }

function renderAll(){ renderHero(); renderStats(); renderGrid(); }

// ── DateTime ───────────────────────────────────────────────────────
(function(){
  const now=new Date();
  document.getElementById('today-label').textContent=`${DAYS[now.getDay()]} · ${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
  document.getElementById('hday').textContent=DAYS[now.getDay()];
  document.getElementById('hdate').textContent=`${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
  const tick=()=>{
    const t=new Date();
    document.getElementById('clock').textContent=[t.getHours(),t.getMinutes(),t.getSeconds()].map(n=>String(n).padStart(2,'0')).join(':');
  };
  tick(); setInterval(tick,1000);
})();

// ── Boot ───────────────────────────────────────────────────────────
document.getElementById('newinput').addEventListener('keydown',e=>{if(e.key==='Enter')addHabit();});
ensure(TODAY);
renderAll();
setTimeout(renderAll,80);
</script>
</body>
</html>
