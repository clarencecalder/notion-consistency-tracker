<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consistency Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111110;
    --surface: #1C1C1A;
    --surface2: #242422;
    --border: #2E2E2B;
    --text: #EEECEA;
    --text-muted: #6B6966;
    --accent: #5A9E27;
    --accent-light: #8BC34A;
    --warn: #E07040;
    --warn-pale: #2A1A10;
    --shadow: 0 1px 3px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 24px;
  }

  .page { max-width: 960px; margin: 0 auto; }

  /* ── Header ── */
  .header {
    margin-bottom: 28px;
    display: flex; align-items: flex-end;
    justify-content: space-between; gap: 16px; flex-wrap: wrap;
  }
  .header-left h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 38px; font-weight: 400; letter-spacing: -0.5px; line-height: 1.1;
  }
  .header-left p {
    font-size: 13px; color: var(--text-muted); margin-top: 4px;
    font-family: 'DM Mono', monospace; font-weight: 300;
  }
  .clock {
    font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-muted);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 14px;
  }

  /* ── Hero card ── */
  .hero {
    background: #1C1C1A; border: 1px solid var(--border); border-radius: 16px; padding: 24px 28px;
    margin-bottom: 20px; display: flex; align-items: center; gap: 28px;
    position: relative; overflow: hidden;
  }
  .hero::before { content:''; position:absolute; top:-50px; right:-50px; width:200px; height:200px; border-radius:50%; background:rgba(255,255,255,0.02); }
  .hero::after  { content:''; position:absolute; bottom:-70px; right:80px; width:140px; height:140px; border-radius:50%; background:rgba(255,255,255,0.015); }

  .score-ring { position:relative; flex-shrink:0; }
  .score-ring svg { transform:rotate(-90deg); }
  .ring-track { fill:none; stroke:var(--border); stroke-width:6; }
  .ring-fill  { fill:none; stroke:#8BC34A; stroke-width:6; stroke-linecap:round; transition:stroke-dashoffset 1s cubic-bezier(0.4,0,0.2,1); }
  .ring-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .ring-pct  { font-family:'Instrument Serif',serif; font-size:28px; color:var(--text); line-height:1; }
  .ring-sub  { font-size:10px; color:var(--text-muted); font-family:'DM Mono',monospace; margin-top:2px; }

  .hero-info  { flex:1; min-width:0; }
  .hero-day   { font-family:'Instrument Serif',serif; font-size:22px; color:var(--text); font-style:italic; }
  .hero-date  { font-size:11px; color:var(--text-muted); font-family:'DM Mono',monospace; margin-top:2px; margin-bottom:14px; }
  .hero-bar-wrap { background:var(--surface2); border-radius:6px; height:5px; overflow:hidden; }
  .hero-bar-fill { height:100%; background:linear-gradient(90deg,#5A9E27,#8BC34A); border-radius:6px; transition:width 1s cubic-bezier(0.4,0,0.2,1); }
  .hero-counts { display:flex; gap:20px; margin-top:10px; }
  .hero-count  { font-size:12px; color:var(--text-muted); font-family:'DM Mono',monospace; }
  .hero-count span { color:var(--text); font-weight:500; }

  /* ── Stats ── */
  .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px; }
  .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; text-align:center; box-shadow:var(--shadow); }
  .stat-val  { font-family:'Instrument Serif',serif; font-size:28px; color:var(--text); line-height:1; }
  .stat-lbl  { font-size:11px; font-family:'DM Mono',monospace; color:var(--text-muted); margin-top:4px; }

  /* ── Panel ── */
  .panel { background:var(--surface); border:1px solid var(--border); border-radius:14px; overflow:hidden; box-shadow:var(--shadow); margin-bottom:20px; }
  .panel-header { padding:14px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .panel-title  { font-size:13px; font-weight:500; letter-spacing:0.3px; }
  .panel-badge  { font-family:'DM Mono',monospace; font-size:11px; color:var(--text-muted); background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:2px 10px; }

  .week-nav { display:flex; align-items:center; gap:8px; }
  .week-nav-btn {
    width:28px; height:28px; border-radius:7px; border:1px solid var(--border);
    background:var(--surface2); cursor:pointer; font-size:16px; color:var(--text-muted);
    display:flex; align-items:center; justify-content:center; transition:all 0.15s; line-height:1;
  }
  .week-nav-btn:hover:not(:disabled) { background:var(--surface); color:var(--text); border-color:var(--text-muted); }
  .week-nav-btn:disabled { opacity:0.3; cursor:default; }
  .week-range { font-family:'DM Mono',monospace; font-size:11px; color:var(--text-muted); }

  /* ── Week Grid ── */
  .week-grid-scroll { overflow-x:auto; }

  .week-grid {
    display:grid;
    grid-template-columns: 200px repeat(7, 1fr);
    min-width:560px;
  }

  /* shared cell base */
  .wg-cell-base {
    display:flex; align-items:center; justify-content:center;
    padding:10px 6px;
    border-bottom:1px solid var(--border);
  }

  /* column 1 (habit name) */
  .wg-name-cell {
    display:flex; align-items:center; gap:10px;
    padding:10px 12px 10px 20px;
    border-bottom:1px solid var(--border);
  }
  .wg-emoji { font-size:15px; width:20px; text-align:center; flex-shrink:0; }
  .wg-label { flex:1; min-width:0; }
  .wg-habit-name { font-size:13px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .wg-habit-cat  { font-size:10px; font-family:'DM Mono',monospace; color:var(--text-muted); margin-top:1px; }
  .wg-del {
    opacity:0; background:none; border:none; cursor:pointer;
    color:var(--text-muted); font-size:12px; padding:2px 4px; border-radius:4px;
    transition:all 0.15s; flex-shrink:0;
  }
  .wg-name-cell:hover .wg-del { opacity:1; }
  .wg-del:hover { color:var(--warn); background:var(--warn-pale); }
  .wg-name-cell:hover { background:var(--surface2); }

  /* header cells */
  .wg-head { text-align:center; padding:10px 6px 8px; border-bottom:1px solid var(--border); }
  .wg-head:first-child { text-align:left; padding-left:20px; border-bottom:1px solid var(--border); }
  .wg-head-name { font-family:'DM Mono',monospace; font-size:10px; font-weight:500; color:var(--text-muted); display:block; }
  .wg-head-num  { font-size:14px; font-weight:500; color:var(--text); display:inline-block; margin-top:3px; width:26px; height:26px; line-height:26px; text-align:center; }
  .wg-head.is-today .wg-head-name { color:var(--accent-light); }
  .wg-head.is-today .wg-head-num  { background:var(--accent); color:#fff; border-radius:50%; }

  /* pct summary cells */
  .wg-pct-cell {
    text-align:center; padding:8px 6px;
    border-bottom:1px solid var(--border); background:var(--surface2);
  }
  .wg-pct-cell:first-child { text-align:left; padding-left:20px; font-size:11px; font-family:'DM Mono',monospace; color:var(--text-muted); display:flex; align-items:center; }
  .wg-pct-num { font-family:'DM Mono',monospace; font-size:11px; font-weight:500; display:block; margin-bottom:4px; }
  .wg-bar-wrap { height:3px; border-radius:3px; background:var(--border); overflow:hidden; margin:0 auto; width:70%; }
  .wg-bar-fill { height:100%; border-radius:3px; transition:width 0.6s ease; }

  /* toggle cells */
  .wg-toggle {
    display:flex; align-items:center; justify-content:center;
    padding:10px 6px; border-bottom:1px solid var(--border);
    cursor:pointer; transition:background 0.12s;
  }
  .wg-toggle:hover:not(.is-future) { background:var(--surface2); }
  .wg-toggle.is-future { cursor:not-allowed; }

  .wg-dot {
    width:24px; height:24px; border-radius:7px;
    border:1.5px solid var(--border); background:var(--surface);
    display:flex; align-items:center; justify-content:center;
    transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  .wg-dot svg { opacity:0; transform:scale(0.4); transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1); }
  .wg-toggle.is-done .wg-dot { background:var(--accent); border-color:var(--accent); transform:scale(1.1); }
  .wg-toggle.is-done .wg-dot svg { opacity:1; transform:scale(1); }
  .wg-toggle.is-future .wg-dot { opacity:0.3; background:var(--surface2); }

  /* bottom total row */
  .wg-total { background:var(--surface2); text-align:center; padding:9px 6px; }
  .wg-total:first-child { text-align:left; padding-left:20px; font-size:11px; font-family:'DM Mono',monospace; color:var(--text-muted); display:flex; align-items:center; }
  .wg-total-val { font-family:'DM Mono',monospace; font-size:12px; font-weight:600; }

  /* add row */
  .add-wrap { padding:12px 20px; display:flex; gap:8px; }
  .add-input {
    flex:1; border:1px solid var(--border); border-radius:8px;
    padding:8px 12px; font-size:13px; font-family:'DM Sans',sans-serif;
    background:var(--surface2); color:var(--text); outline:none; transition:border-color 0.15s;
  }
  .add-input:focus { border-color:var(--accent-light); background:var(--surface); }
  .add-input::placeholder { color:var(--text-muted); }
  .add-btn { background:var(--accent); color:#fff; border:none; border-radius:8px; padding:8px 16px; font-size:13px; font-family:'DM Sans',sans-serif; cursor:pointer; transition:opacity 0.15s; }
  .add-btn:hover { opacity:0.8; }

  .empty-state { padding:36px 20px; text-align:center; color:var(--text-muted); font-size:13px; font-family:'DM Mono',monospace; grid-column:1/-1; }
  .empty-icon  { font-size:28px; display:block; margin-bottom:8px; }

  @media(max-width:620px){
    .hero { flex-direction:column; text-align:center; }
    .hero-counts { justify-content:center; }
    .stats-row { grid-template-columns:repeat(3,1fr); }
  }
</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1>Consistency</h1>
      <p id="today-date"></p>
    </div>
    <div class="clock" id="clock"></div>
  </div>

  <!-- Hero -->
  <div class="hero">
    <div class="score-ring">
      <svg width="86" height="86" viewBox="0 0 86 86">
        <circle class="ring-track" cx="43" cy="43" r="36"/>
        <circle class="ring-fill" id="ring-fill" cx="43" cy="43" r="36"
          stroke-dasharray="226.19" stroke-dashoffset="226.19"/>
      </svg>
      <div class="ring-center">
        <div class="ring-pct" id="pct-display">0%</div>
        <div class="ring-sub">today</div>
      </div>
    </div>
    <div class="hero-info">
      <div class="hero-day"  id="hero-day"></div>
      <div class="hero-date" id="hero-date"></div>
      <div class="hero-bar-wrap"><div class="hero-bar-fill" id="hero-bar" style="width:0%"></div></div>
      <div class="hero-counts">
        <div class="hero-count"><span id="done-count">0</span> done</div>
        <div class="hero-count"><span id="total-count">0</span> total</div>
        <div class="hero-count"><span id="streak-hero">0</span> day streak 🔥</div>
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card"><div class="stat-val" id="stat-avg">—</div><div class="stat-lbl">7-day avg</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-best">—</div><div class="stat-lbl">best day</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-streak">0</div><div class="stat-lbl">streak days</div></div>
  </div>

  <!-- Weekly Grid Panel -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Weekly Progress</span>
      <div style="display:flex;align-items:center;gap:12px;">
        <span class="panel-badge" id="habit-badge">0 habits</span>
        <div class="week-nav">
          <button class="week-nav-btn" id="btn-prev" onclick="shiftWeek(-1)">‹</button>
          <span class="week-range" id="week-range"></span>
          <button class="week-nav-btn" id="btn-next" onclick="shiftWeek(1)">›</button>
        </div>
      </div>
    </div>

    <div class="week-grid-scroll">
      <div class="week-grid" id="week-grid"></div>
    </div>

    <div class="add-wrap">
      <input class="add-input" id="new-habit-input" placeholder="Add a habit or task…" maxlength="60"/>
      <button class="add-btn" onclick="addHabit()">Add</button>
    </div>
  </div>

</div>
<script>
const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

// ── State ──────────────────────────────────────────────────────────
const DEFAULT_HABITS = [
  { id:1, name:'Morning workout',       emoji:'🏋️', category:'health'      },
  { id:2, name:'Read for 30 mins',      emoji:'📖', category:'learning'    },
  { id:3, name:'Drink 8 glasses water', emoji:'💧', category:'health'      },
  { id:4, name:'Meditate',              emoji:'🧘', category:'wellness'    },
  { id:5, name:'Journal entry',         emoji:'✍️', category:'mindfulness' },
];

// Safe storage: falls back to memory if localStorage is blocked (e.g. Notion iframe)
const storage = (() => {
  let mem = {};
  try {
    localStorage.setItem('__test__', '1');
    localStorage.removeItem('__test__');
    return {
      get: () => { try { return JSON.parse(localStorage.getItem('cons_v4')||'{}'); } catch { return {}; } },
      set: (v) => { try { localStorage.setItem('cons_v4', JSON.stringify(v)); } catch {} }
    };
  } catch {
    return { get: () => mem, set: (v) => { mem = v; } };
  }
})();

function load() { return storage.get(); }
function save() { storage.set(state); }

let state = load();
if (!state.habits)  { state.habits = DEFAULT_HABITS; state.nextId = 6; }
if (!state.history) state.history = {};
if (!state.nextId)  state.nextId = state.habits.length + 1;

let weekOffset = 0; // 0 = current week, negative = past

// ── Date helpers ────────────────────────────────────────────────────
function key(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}
const TODAY_KEY = key(new Date());

function getWeekDates(offset) {
  const today = new Date();
  const dow   = today.getDay();
  const toMon = dow === 0 ? -6 : 1 - dow;
  const mon   = new Date(today);
  mon.setDate(today.getDate() + toMon + offset * 7);
  return Array.from({length:7}, (_,i) => { const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}

function isFuture(d) { return key(d) > TODAY_KEY; }

function ensure(k) { if (!state.history[k]) state.history[k] = { completed:[] }; }

// ── Computed ────────────────────────────────────────────────────────
function dayPct(k) {
  const h = state.history[k];
  if (!h || !state.habits.length) return 0;
  return Math.round((h.completed.length / state.habits.length) * 100);
}

function barColor(pct) {
  if (pct >= 100) return '#2D5016';
  if (pct >= 60)  return '#4A8025';
  if (pct >= 30)  return '#B8860B';
  return '#C4581A';
}

function streak() {
  let s=0, today=new Date();
  for (let i=0;i<365;i++) {
    const d=new Date(today); d.setDate(today.getDate()-i);
    const h=state.history[key(d)];
    if (!h||!state.habits.length) { if(i===0) continue; break; }
    if (h.completed.length/state.habits.length>=0.5) s++;
    else if (i>0) break;
  }
  return s;
}

function habitStreak(id) {
  let s=0, today=new Date();
  for (let i=0;i<365;i++) {
    const d=new Date(today); d.setDate(today.getDate()-i);
    const h=state.history[key(d)];
    if (h&&h.completed.includes(id)) s++;
    else if (i>0) break;
  }
  return s;
}

// ── Render: Hero ────────────────────────────────────────────────────
function renderHero() {
  ensure(TODAY_KEY);
  const comp=state.history[TODAY_KEY].completed, total=state.habits.length;
  const pct=total?Math.round((comp.length/total)*100):0;
  document.getElementById('pct-display').textContent=pct+'%';
  document.getElementById('done-count').textContent=comp.length;
  document.getElementById('total-count').textContent=total;
  document.getElementById('hero-bar').style.width=pct+'%';
  const circ=226.19;
  document.getElementById('ring-fill').style.strokeDashoffset=circ-(pct/100)*circ;
  const s=streak();
  document.getElementById('streak-hero').textContent=s;
  document.getElementById('stat-streak').textContent=s;
}

function renderStats() {
  const today=new Date(), pcts=[];
  for (let i=1;i<=7;i++) {
    const d=new Date(today); d.setDate(today.getDate()-i);
    const k=key(d);
    if (state.history[k]) pcts.push(dayPct(k));
  }
  if (pcts.length) {
    document.getElementById('stat-avg').textContent=Math.round(pcts.reduce((a,b)=>a+b,0)/pcts.length)+'%';
    document.getElementById('stat-best').textContent=Math.max(...pcts)+'%';
  }
}

// ── Render: Weekly Grid ─────────────────────────────────────────────
function renderGrid() {
  const days = getWeekDates(weekOffset);
  const grid = document.getElementById('week-grid');

  // Nav
  const f=days[0], l=days[6];
  document.getElementById('week-range').textContent=
    `${MONTHS[f.getMonth()].slice(0,3)} ${f.getDate()} – ${MONTHS[l.getMonth()].slice(0,3)} ${l.getDate()}`;
  document.getElementById('btn-next').disabled = weekOffset >= 0;
  document.getElementById('habit-badge').textContent=
    `${state.habits.length} habit${state.habits.length!==1?'s':''}`;

  let html = '';

  // ── Row 1: Day headers ──
  html += `<div class="wg-head" style="font-size:11px;font-family:'DM Mono',monospace;color:var(--text-muted);display:flex;align-items:center;">Habit</div>`;
  days.forEach(d => {
    const isToday = key(d)===TODAY_KEY;
    html += `<div class="wg-head ${isToday?'is-today':''}">
      <span class="wg-head-name">${DAYS[d.getDay()]}</span>
      <span class="wg-head-num">${d.getDate()}</span>
    </div>`;
  });

  // ── Row 2: Daily % summary ──
  html += `<div class="wg-pct-cell">Daily %</div>`;
  days.forEach(d => {
    const k=key(d), fut=isFuture(d);
    const pct=fut?null:dayPct(k);
    const color=fut?'var(--border)':barColor(pct||0);
    html += `<div class="wg-pct-cell">
      <span class="wg-pct-num" style="color:${fut?'var(--text-muted)':color}">${fut?'–':pct+'%'}</span>
      <div class="wg-bar-wrap"><div class="wg-bar-fill" style="width:${fut?0:pct}%;background:${color}"></div></div>
    </div>`;
  });

  // ── Habit rows ──
  if (!state.habits.length) {
    html += `<div class="empty-state"><span class="empty-icon">📋</span>No habits yet — add one below.</div>`;
  } else {
    state.habits.forEach(h => {
      const hs = habitStreak(h.id);
      html += `<div class="wg-name-cell">
        <span class="wg-emoji">${h.emoji}</span>
        <div class="wg-label">
          <div class="wg-habit-name">${h.name}</div>
          <div class="wg-habit-cat">${h.category}${hs>1?' · '+hs+'d 🔥':''}</div>
        </div>
        <button class="wg-del" onclick="deleteHabit(event,${h.id})">✕</button>
      </div>`;

      days.forEach(d => {
        const k=key(d), fut=isFuture(d);
        ensure(k);
        const done=state.history[k].completed.includes(h.id);
        html += `<div class="wg-toggle ${done?'is-done':''} ${fut?'is-future':''}"
          ${!fut?`onclick="toggle('${k}',${h.id})"`:''}>
          <div class="wg-dot">
            <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
              <path d="M1 3.5L3.5 6L9 1" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>`;
      });
    });
  }

  // ── Bottom total row ──
  html += `<div class="wg-total">Week avg</div>`;
  days.forEach(d => {
    const k=key(d), fut=isFuture(d);
    const pct=fut?null:dayPct(k);
    const color=fut?'var(--text-muted)':barColor(pct||0);
    html += `<div class="wg-total"><span class="wg-total-val" style="color:${color}">${fut?'–':pct+'%'}</span></div>`;
  });

  grid.innerHTML = html;
}

// ── Actions ─────────────────────────────────────────────────────────
function toggle(k, id) {
  ensure(k);
  const c=state.history[k].completed, i=c.indexOf(id);
  if (i>-1) c.splice(i,1); else c.push(id);
  save(); renderAll();
}

function addHabit() {
  const inp=document.getElementById('new-habit-input'), name=inp.value.trim();
  if (!name) return;
  const emojis=['✅','📌','⭐','🎯','💪','🌱','🔥','✨','🎨','📝','🏃','🧠','💡','🌟','⚡'];
  const cats  =['health','learning','wellness','productivity','mindfulness','fitness','creativity','general'];
  state.habits.push({ id:state.nextId++, name, emoji:emojis[Math.floor(Math.random()*emojis.length)], category:cats[Math.floor(Math.random()*cats.length)] });
  save(); inp.value=''; renderAll();
}

function deleteHabit(e, id) {
  e.stopPropagation();
  state.habits=state.habits.filter(h=>h.id!==id);
  Object.values(state.history).forEach(d=>{ d.completed=d.completed.filter(c=>c!==id); });
  save(); renderAll();
}

function shiftWeek(dir) {
  weekOffset=Math.min(0,weekOffset+dir);
  renderGrid();
}

function renderAll() { renderHero(); renderStats(); renderGrid(); }

// ── DateTime ────────────────────────────────────────────────────────
(function initDateTime(){
  const now=new Date();
  document.getElementById('today-date').textContent=`${DAYS[now.getDay()]} · ${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
  document.getElementById('hero-day').textContent=DAYS[now.getDay()];
  document.getElementById('hero-date').textContent=`${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
  const tick=()=>{
    const t=new Date();
    document.getElementById('clock').textContent=[t.getHours(),t.getMinutes(),t.getSeconds()].map(n=>String(n).padStart(2,'0')).join(':');
  };
  tick(); setInterval(tick,1000);
})();

// ── Seed demo ────────────────────────────────────────────────────────
(function seedDemo(){
  try {
    const past=Object.keys(state.history).filter(k=>k!==TODAY_KEY);
    if (past.length>=5) return;
    const today=new Date(), ids=state.habits.map(h=>h.id);
    if (!ids.length) return;
    for (let i=1;i<=13;i++){
      const d=new Date(today); d.setDate(today.getDate()-i);
      const k=key(d);
      if (!state.history[k]) {
        const count=Math.floor(Math.random()*(ids.length+1));
        state.history[k]={ completed:[...ids].sort(()=>0.5-Math.random()).slice(0,count) };
      }
    }
    save();
  } catch(e) { console.warn('seed skipped', e); }
})();

// ── Boot ─────────────────────────────────────────────────────────────
try {
  ensure(TODAY_KEY);
  renderAll();
  setTimeout(renderAll, 120);
} catch(e) {
  document.body.innerHTML = `<div style="padding:40px;font-family:monospace;color:#c00">Dashboard error: ${e.message}<br><br><small>Open browser console for details.</small></div>`;
  console.error(e);
}

document.getElementById('new-habit-input').addEventListener('keydown', e=>{ if(e.key==='Enter') addHabit(); });
</script>
</body>
